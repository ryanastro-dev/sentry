name: ci

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - README.md
      - docs/**
  pull_request:
    paths-ignore:
      - README.md
      - docs/**
  workflow_dispatch:

jobs:
  zig-checks:
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Zig toolchain
        uses: actions/cache@v4
        with:
          path: |
            .tools/zig-0.15.2.zip
            .tools/zig-x86_64-windows-0.15.2
          key: zig-windows-x64-0.15.2

      - name: Build watcher sidecar
        shell: pwsh
        run: .\scripts\build-watcher.ps1

      - name: Run watcher unit tests
        shell: pwsh
        run: .\.tools\zig-x86_64-windows-0.15.2\zig.exe test .\watcher-zig\src\main.zig

  rust-checks:
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create sidecar placeholder for Tauri build script
        shell: pwsh
        run: |
          $sidecar = "watcher-zig/zig-out/bin/sentry-watcher-x86_64-pc-windows-msvc.exe"
          $sidecarDir = Split-Path $sidecar -Parent
          New-Item -ItemType Directory -Path $sidecarDir -Force | Out-Null
          if (-not (Test-Path $sidecar)) {
            New-Item -ItemType File -Path $sidecar -Force | Out-Null
          }

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('ui/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust check
        working-directory: ui/src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: ui/src-tauri
        run: cargo test

  ui-checks:
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: UI typecheck
        working-directory: ui
        run: npm run check

      - name: UI production build
        working-directory: ui
        run: npm run build
